<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">FrontDeskAgent local-first architecture</title>
  <desc id="desc">Architecture diagram showing intake channels, the FrontDeskAgent core, local-first AI routing, optional paid API fallback, and business integrations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081416"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#24f1d5"/>
      <stop offset="1" stop-color="#0ea5a6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6d365"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0 0 11 5.5 0 11Z" fill="#7dd3fc"/>
    </marker>
    <style>
      .label{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#f8fafc}
      .text{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#cbd5e1}
      .small{font-size:15px}
      .tiny{font-size:13px}
      .box{fill:#0f1d21;stroke:#2dd4bf;stroke-opacity:.26;stroke-width:2}
      .api{fill:#221e12;stroke:#f6d365;stroke-opacity:.34;stroke-width:2}
      .line{fill:none;stroke:#7dd3fc;stroke-opacity:.58;stroke-width:3;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <g opacity=".13">
    <path d="M80 116h1120M80 244h1120M80 372h1120M80 500h1120M80 628h1120M180 60v640M360 60v640M540 60v640M720 60v640M900 60v640M1080 60v640" stroke="#24f1d5"/>
  </g>
  <text x="64" y="68" class="label" font-size="34">FrontDeskAgent: local-first front desk stack</text>
  <text x="64" y="102" class="text small">Self-hosted by default. OpenZero and local CPU models first. Paid APIs only when configured.</text>

  <g transform="translate(64 154)">
    <rect class="box" width="240" height="390" rx="18"/>
    <text x="28" y="46" class="label" font-size="22">Intake channels</text>
    <g transform="translate(28 80)">
      <rect width="184" height="46" rx="12" fill="#13292d"/>
      <text x="18" y="29" class="text small">Website chat</text>
      <rect y="64" width="184" height="46" rx="12" fill="#13292d"/>
      <text x="18" y="93" class="text small">Inbound voice</text>
      <rect y="128" width="184" height="46" rx="12" fill="#13292d"/>
      <text x="18" y="157" class="text small">SMS / WhatsApp path</text>
      <rect y="192" width="184" height="46" rx="12" fill="#13292d"/>
      <text x="18" y="221" class="text small">Email parser webhook</text>
      <rect y="256" width="184" height="46" rx="12" fill="#13292d"/>
      <text x="18" y="285" class="text small">Forms and APIs</text>
    </g>
  </g>

  <g transform="translate(414 132)">
    <rect width="452" height="436" rx="22" fill="#0b1719" stroke="#24f1d5" stroke-opacity=".45" stroke-width="3"/>
    <rect x="24" y="28" width="160" height="34" rx="17" fill="url(#teal)"/>
    <text x="46" y="51" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="900" fill="#071314">CORE APP</text>
    <text x="26" y="108" class="label" font-size="28">FrontDeskAgent</text>
    <text x="26" y="140" class="text small">Flask, SQLite, admin console, knowledge base,</text>
    <text x="26" y="164" class="text small">lead queue, appointment requests, and handoffs.</text>
    <g transform="translate(26 206)">
      <rect class="box" width="180" height="78" rx="14"/>
      <text x="18" y="32" class="label" font-size="17">Lead inbox</text>
      <text x="18" y="56" class="text tiny">local SQLite records</text>
      <rect x="220" class="box" width="180" height="78" rx="14"/>
      <text x="238" y="32" class="label" font-size="17">Knowledge</text>
      <text x="238" y="56" class="text tiny">manual notes + web import</text>
      <rect y="108" class="box" width="180" height="78" rx="14"/>
      <text x="18" y="140" class="label" font-size="17">Bookings</text>
      <text x="18" y="164" class="text tiny">requests + ICS feed</text>
      <rect x="220" y="108" class="box" width="180" height="78" rx="14"/>
      <text x="238" y="140" class="label" font-size="17">Security</text>
      <text x="238" y="164" class="text tiny">auth, secrets, signatures</text>
    </g>
  </g>

  <g transform="translate(976 118)">
    <rect class="box" width="240" height="198" rx="18"/>
    <text x="24" y="46" class="label" font-size="22">AI route order</text>
    <text x="24" y="82" class="text small">1. OpenZero local LLM</text>
    <text x="24" y="114" class="text small">2. Ollama CPU model</text>
    <text x="24" y="146" class="text small">3. llama.cpp GGUF</text>
    <text x="24" y="178" class="text small">4. rules fallback</text>
  </g>
  <g transform="translate(976 358)">
    <rect class="api" width="240" height="118" rx="18"/>
    <text x="24" y="46" class="label" font-size="22">API fallback</text>
    <text x="24" y="82" class="text small">OpenAI-compatible</text>
    <text x="24" y="104" class="text tiny">only when keys are added</text>
  </g>
  <g transform="translate(976 520)">
    <rect class="box" width="240" height="118" rx="18"/>
    <text x="24" y="46" class="label" font-size="22">Business systems</text>
    <text x="24" y="82" class="text small">CRM, calendar, SMS,</text>
    <text x="24" y="104" class="text small">callbacks, OpenZero events</text>
  </g>

  <path class="line" d="M304 350H410"/>
  <path class="line" d="M866 270h106"/>
  <path class="line" d="M866 390h106"/>
  <path class="line" d="M866 544h106"/>
  <path class="line" d="M1096 316v38"/>
  <text x="430" y="626" class="text small">Designed for ordinary CPU servers first. Operators can add paid APIs later without rebuilding the app.</text>
</svg>
