services:
  frontdeskagent:
    build: .
    container_name: frontdeskagent
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8088:8088"
    volumes:
      - ./data:/app/data
      - ./runtime:/app/runtime

